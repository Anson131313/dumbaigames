<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Whack — Catch the Moles!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow:hidden;touch-action:none}
h1{font-size:1.8rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:32px;margin-bottom:12px;font-size:1rem;font-weight:700}
.stat span{color:#00d4ff}
canvas{border:2px solid rgba(108,99,255,.4);border-radius:12px;box-shadow:0 0 40px rgba(108,99,255,.2)}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,.92);border-radius:12px}
#overlay h2{font-size:2.5rem;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#overlay p{color:#9999b0;margin-bottom:8px;font-size:1rem;text-align:center;max-width:280px;line-height:1.6}
#overlay .final{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:20px}
#playBtn{background:linear-gradient(135deg,#6c63ff,#00d4ff);color:#fff;border:none;padding:14px 40px;border-radius:50px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .2s}
#playBtn:hover{transform:scale(1.05)}
.controls-hint{margin-top:12px;font-size:.8rem;color:#9999b0;text-align:center}
/* Swipe buttons for mobile */
#dpad{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px;gap:4px}
#dpad button{background:rgba(108,99,255,.3);border:2px solid rgba(108,99,255,.5);color:#fff;font-size:1.4rem;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#dpad button:active{background:rgba(108,99,255,.7)}
#dpad .up{grid-column:2;grid-row:1}
#dpad .left{grid-column:1;grid-row:2}
#dpad .down{grid-column:2;grid-row:2}
#dpad .right{grid-column:3;grid-row:2}
@media(max-width:600px){
  #dpad{display:grid}
  canvas{width:360px!important;height:360px!important}
}
</style>
</head>
<body>
<h1>🐍 Snake Whack 🔨</h1>
<div class="stats">
  <div>Score: <span id="score">0</span></div>
  <div>Missed: <span id="missed">0</span></div>
  <div>Length: <span id="length">1</span></div>
</div>
<div style="position:relative">
  <canvas id="c" width="480" height="480"></canvas>
  <div id="overlay">
    <h2>Snake Whack</h2>
    <p>Eat the moles before they escape! Miss <b>5</b> and it's game over. You grow longer with each catch!</p>
    <div id="finalScore" class="final" style="display:none"></div>
    <button id="playBtn">Play Now 🎮</button>
    <div class="controls-hint">Arrow Keys / WASD • Swipe on mobile</div>
  </div>
</div>

<div id="dpad">
  <button class="up" onclick="setDir(0,-1)">▲</button>
  <button class="left" onclick="setDir(-1,0)">◀</button>
  <button class="down" onclick="setDir(0,1)">▼</button>
  <button class="right" onclick="setDir(1,0)">▶</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 14, ROWS = 14;
const CELL = canvas.width / COLS;
const MAX_MISS = 5;
const MOLE_BASE_TIME = 5000; // ms mole stays up at start

let snake, dir, nextDir, score, missed, mole, moleTimer, gameLoop, speed, running;

function init() {
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  missed = 0;
  speed = 220;
  running = true;
  spawnMole();
  updateStats();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
}

function spawnMole() {
  clearTimeout(moleTimer);
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while(snake.some(s => s.x===pos.x && s.y===pos.y));
  mole = pos;
  mole.born = Date.now();
  // Timer gets shorter as score goes up, min 1200ms
  const moleTime = Math.max(1200, MOLE_BASE_TIME - score * 8);
  mole.timeAllowed = moleTime;
  moleTimer = setTimeout(() => {
    missed++;
    updateStats();
    if(missed >= MAX_MISS) endGame();
    else spawnMole();
  }, moleTime);
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if(head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
  // Self collision
  if(snake.some(s => s.x===head.x && s.y===head.y)) return endGame();

  snake.unshift(head);

  // Caught the mole!
  if(head.x === mole.x && head.y === mole.y) {
    clearTimeout(moleTimer);
    score += 10;
    // Speed up slightly
    if(score % 50 === 0) {
      speed = Math.max(70, speed - 10);
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }
    updateStats();
    spawnMole();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // Background grid
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  ctx.lineWidth = 1;
  for(let i=0;i<=COLS;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();
  }
  for(let j=0;j<=ROWS;j++){
    ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(canvas.width,j*CELL);ctx.stroke();
  }

  // Mole timer bar
  const elapsed = Date.now() - mole.born;
  const pct = 1 - (elapsed / (mole.timeAllowed || MOLE_BASE_TIME));
  const barW = CELL * pct;
  ctx.fillStyle = pct > 0.5 ? '#00d4ff' : pct > 0.25 ? '#f59e0b' : '#ef4444';
  ctx.fillRect(mole.x*CELL, mole.y*CELL + CELL - 4, barW, 4);

  // Mole
  const bounce = Math.sin(Date.now()/150) * 2;
  ctx.font = `${CELL-4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐹', mole.x*CELL + CELL/2, mole.y*CELL + CELL/2 + bounce);

  // Snake body
  snake.forEach((seg, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    if(i === 0) {
      // Head
      const grad = ctx.createRadialGradient(
        seg.x*CELL+CELL/2, seg.y*CELL+CELL/2, 2,
        seg.x*CELL+CELL/2, seg.y*CELL+CELL/2, CELL/2
      );
      grad.addColorStop(0, '#a78bfa');
      grad.addColorStop(1, '#6c63ff');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL+2, seg.y*CELL+2, CELL-4, CELL-4, 6);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      const ex = dir.x, ey = dir.y;
      const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
      ctx.beginPath();ctx.arc(cx+ex*4+ey*4, cy+ey*4-ex*4, 3, 0, Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+ex*4-ey*4, cy+ey*4+ex*4, 3, 0, Math.PI*2);ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();ctx.arc(cx+ex*5+ey*4, cy+ey*5-ex*4, 1.5, 0, Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+ex*5-ey*4, cy+ey*5+ex*4, 1.5, 0, Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle = `rgba(108,99,255,${alpha})`;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL+3, seg.y*CELL+3, CELL-6, CELL-6, 4);
      ctx.fill();
    }
  });
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('missed').textContent = `${missed}/${MAX_MISS}`;
  document.getElementById('length').textContent = snake.length;
}

function endGame() {
  running = false;
  clearInterval(gameLoop);
  clearTimeout(moleTimer);
  const ov = document.getElementById('overlay');
  const fs = document.getElementById('finalScore');
  document.querySelector('#overlay h2').textContent = missed >= MAX_MISS ? 'They Escaped! 😤' : 'You Crashed! 💀';
  fs.textContent = `Score: ${score} | Length: ${snake.length}`;
  fs.style.display = 'block';
  document.querySelector('#overlay p').textContent = 'Those sneaky moles got away. Try again?';
  document.getElementById('playBtn').textContent = 'Play Again 🎮';
  ov.style.display = 'flex';
}

// Keyboard
window.addEventListener('keydown', e => {
  if(!running) return;
  const map = {
    ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
    KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}
  };
  const d = map[e.code];
  if(d && !(d.x===-dir.x && d.y===-dir.y)) { nextDir=d; e.preventDefault(); }
});

function setDir(x,y) {
  if(!running) return;
  if(x===-dir.x && y===-dir.y) return;
  nextDir = {x,y};
}

// Swipe
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault()},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0);
  else setDir(0,dy>0?1:-1);
  e.preventDefault();
},{passive:false});

document.getElementById('playBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('finalScore').style.display = 'none';
  init();
  draw();
});
</script>
</body>
</html>
